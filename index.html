<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website Builder</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">YOUR LOGO</div>

        <div class="lang">
            <button>English</button>
            <button class="active">العربية</button>
        </div>
    </nav>

    <!-- Content -->
    <div class="hero-content">

        <div class="text">
            <h1>Visualize your website concept in minutes</h1>
            <p>Answer a few questions and preview your website before building it</p>

            <button id="startNow">Start Now</button>

            <div class="features">
                <span>✔ No sign-up needed</span>
                <span>⏱ Ready in under 2 minutes</span>
                <span>💼 Built for businesses</span>
            </div>
        </div>

        <div class="image">
            <img src="https://cdn.dribbble.com/users/1787323/screenshots/11114135/media/6b2c4f7f6d6e6f73f7c9f1d4b8b8b8b8.png" alt="">
        </div>

    </div>

</section>

<script src="script.js"></script>
</body>
</html>
